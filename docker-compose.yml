# =============================================================================
# Docker Compose -- Fraud AI Streaming Platform
# =============================================================================
# 6 services: MySQL, Zookeeper, Kafka, ksqlDB, Kafka UI, Fraud Engine
#
# Quick start:
#   cp .env.example .env        # Fill in secrets
#   docker compose up -d --build
#   docker compose logs -f      # Watch startup
#   docker compose down -v      # Teardown (deletes data volumes)
# =============================================================================

networks:
  fraud_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  kafka_data:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # MySQL 8.0 -- Transaction storage, feedback, experiments
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: fraud_mysql
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fraud_db}
      MYSQL_USER: ${MYSQL_USER:-fraud_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - fraud_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Zookeeper -- Kafka coordination
  # ---------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: fraud_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fraud_network
    healthcheck:
      test: nc -z localhost 2181 || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka Broker -- Event streaming (Confluent 7.5.0)
  # ---------------------------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: fraud_kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - fraud_network
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # ksqlDB -- Streaming SQL for real-time velocity counting
  # ---------------------------------------------------------------------------
  ksqldb-server:
    image: confluentinc/ksqldb-server:0.29.0
    hostname: ksqldb-server
    container_name: fraud_ksqldb
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8088:8088"
    environment:
      KSQL_BOOTSTRAP_SERVERS: kafka:29092
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SERVICE_ID: fraud_ksqldb
      KSQL_HEAP_OPTS: "-Xms256m -Xmx1g"
    networks:
      - fraud_network
    healthcheck:
      test: curl -f http://localhost:8088/info || exit 1
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 1536m
          cpus: "1.0"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Kafka UI -- Cluster monitoring dashboard
  # ---------------------------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: fraud_kafka_ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: fraud-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - fraud_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Fraud Engine -- Python modular monolith (API + streaming + detection)
  # ---------------------------------------------------------------------------
  fraud-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fraud_engine
    depends_on:
      kafka:
        condition: service_healthy
      mysql:
        condition: service_healthy
      ksqldb-server:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KSQLDB_URL: http://ksqldb-server:8088
      MYSQL_HOST: mysql
    networks:
      - fraud_network
    healthcheck:
      test: curl -f http://localhost:8000/health || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"
    restart: unless-stopped
